databases:
  - name: rrimportaciones
    plan: free
    databaseName: rrimportaciones
    ipAllowList: []

services:
  - type: web
    name: rrimportaciones-api
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    healthCheckPath: /swagger/index.html
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__SecretKey
        generateValue: 256
      - key: JwtSettings__Issuer
        value: RRImportaciones
      - key: JwtSettings__Audience
        value: RRImportacionesApp
      - key: JwtSettings__ExpirationMinutes
        value: 1440
      - key: JwtSettings__RefreshTokenExpirationDays
        value: 7
      - key: PortalAccess__SecretKey
        generateValue: 128
      - key: Storage__Provider
        value: local
      - key: Smtp__Host
        value: localhost
      - key: Smtp__Port
        value: "1025"
      - key: Smtp__UseSsl
        value: "false"